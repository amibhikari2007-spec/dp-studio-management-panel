<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice - DP Studio & Light</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Poppins;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:850px;
margin:auto;
background:white;
box-shadow:0 10px 40px rgba(0,0,0,.1);
}

/* HEADER */

.invoice-header{
background:#0f1f35;
color:white;
padding:40px;
display:flex;
justify-content:space-between;
}

.company-logo{
width:60px;
height:60px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
color:#0f1f35;
}

.invoice-number{
font-size:20px;
font-weight:700;
}

/* STATUS */

.status-bar{
background:#faf8f3;
padding:15px 40px;
display:flex;
justify-content:space-between;
}

.status-badge{
padding:5px 15px;
border-radius:20px;
font-size:11px;
font-weight:700;
}

/* CONTENT */

.invoice-content{
padding:40px;
}

.billing-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
margin-bottom:40px;
}

.detail-row{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.payment-table{
width:100%;
border-collapse:collapse;
}

.payment-table th{
background:#faf8f3;
padding:12px;
text-align:left;
}

.payment-table td{
padding:15px;
}

.amount-right{
text-align:right;
font-weight:600;
}

/* FOOTER */

.invoice-footer{
background:#0f1f35;
color:white;
padding:30px;
text-align:center;
}

/* BUTTON BAR */

.action-bar{
display:flex;
gap:15px;
justify-content:center;
padding:30px;
background:#fafafa;
}

.btn{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#0f1f35;
color:white;
}

.btn-secondary{
background:white;
border:2px solid #ccc;
}

</style>
</head>

<body>

<div class="container">

<div class="invoice-header">

<div>

<div class="company-logo">DP</div>

<h2>DP STUDIO</h2>

<p>Photography & Cinematography</p>

</div>

<div>

<p>Invoice</p>

<div id="invoiceNum" class="invoice-number">
Loading...
</div>

</div>

</div>


<div class="status-bar">

<div>

<span id="statusBadge" class="status-badge">
Loading
</span>

<span id="eventDateSpan"></span>

</div>

</div>


<div id="invoiceContent" class="invoice-content">

Loading invoice...

</div>


<div class="invoice-footer">

Thank you for choosing DP Studio 📸

</div>

</div>


<div class="action-bar">

<button class="btn btn-primary" onclick="window.print()">
Print
</button>

<button class="btn btn-primary" onclick="sendWhatsApp()">
WhatsApp
</button>

<button class="btn btn-secondary" onclick="downloadPDF()">
Download PDF
</button>

<button class="btn btn-secondary" onclick="history.back()">
Back
</button>

</div>


<script>

/* LOGIN CHECK */

if(!localStorage.getItem("token")){
window.location="/admin.html";
}

let invoice=null;


/* LOAD INVOICE */

loadInvoice();

async function loadInvoice(){

try{

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

if(!id){
alert("Invoice ID missing");
return;
}

const response=await fetch("/booking/"+id,{

headers:{
Authorization:
"Bearer "+localStorage.getItem("token")
}

});

if(!response.ok){

alert("Failed to load invoice");
return;

}

invoice=await response.json();

displayInvoice();

}catch(err){

console.error(err);

alert("Failed to load invoice");

}

}


/* DISPLAY DATA */

function displayInvoice(){

const date=new Date(invoice.eventDate)
.toLocaleDateString("en-IN",{

day:"2-digit",
month:"short",
year:"numeric"

});


document.getElementById("invoiceNum")
.innerText=invoice.invoiceNumber;

document.getElementById("eventDateSpan")
.innerText=date;


/* STATUS COLOR */

const badge=document.getElementById("statusBadge");

badge.innerText=invoice.status;

if(invoice.status==="Paid"){

badge.style.background="#e8f5e9";
badge.style.color="#2e7d32";

}else{

badge.style.background="#ffe5e5";
badge.style.color="#c41e3a";

}


/* CONTENT */

document.getElementById("invoiceContent").innerHTML=`

<div class="billing-grid">

<div>

<h3>Bill To</h3>

<h2>${invoice.customerName}</h2>

<p>${invoice.eventType}</p>

</div>


<div>

<div class="detail-row">

<span>Package</span>

<span>${invoice.packageName}</span>

</div>


<div class="detail-row">

<span>Total Amount</span>

<span>₹ ${invoice.totalAmount}</span>

</div>


<div class="detail-row">

<span>Advance Paid</span>

<span>₹ ${invoice.advancePaid}</span>

</div>


<div class="detail-row">

<span>Balance Due</span>

<span>₹ ${invoice.balanceDue}</span>

</div>

</div>

</div>


<table class="payment-table">

<tr>

<th>Description</th>

<th>Status</th>

<th>Amount</th>

</tr>


<tr>

<td>${invoice.packageName}</td>

<td>Total</td>

<td class="amount-right">
₹ ${invoice.totalAmount}
</td>

</tr>


<tr>

<td>Advance Payment</td>

<td>Paid</td>

<td class="amount-right">
- ₹ ${invoice.advancePaid}
</td>

</tr>


<tr>

<td>Balance Due</td>

<td>${invoice.status}</td>

<td class="amount-right">
₹ ${invoice.balanceDue}
</td>

</tr>

</table>

`;

}


/* WHATSAPP */

function sendWhatsApp(){

if(!invoice.customerPhone){

alert("Customer phone missing");

return;

}

const msg=encodeURIComponent(

`DP Studio & Light

Invoice: ${invoice.invoiceNumber}

Customer: ${invoice.customerName}

Event: ${invoice.eventType}

Total: ₹${invoice.totalAmount}

Advance: ₹${invoice.advancePaid}

Pending: ₹${invoice.balanceDue}

View Invoice:
${window.location.href}

Thank you 📸`

);

window.open(

"https://wa.me/"+invoice.customerPhone+"?text="+msg

);

}


/* PDF DOWNLOAD */

function downloadPDF(){

const element=document.querySelector(".container");

html2pdf().from(element).save(

invoice.invoiceNumber+".pdf"

);

}

</script>

</body>
</html>
