<script>

if (!localStorage.getItem("token")) {
window.location = "/admin.html";
}

let invoice = null;

document.addEventListener("DOMContentLoaded", loadInvoice);

async function loadInvoice(){

try{

const params = new URLSearchParams(window.location.search);

const invoiceId = params.get("id");

if(!invoiceId){

alert("Invoice ID missing");
return;

}

const response = await fetch("/bookings-list");

const data = await response.json();

invoice = data.find(i =>
String(i._id) === String(invoiceId)
);

if(!invoice){

alert("Invoice not found");
return;

}

displayInvoice(invoice);

}catch(error){

console.error(error);
alert("Failed to load invoice");

}

}



function displayInvoice(invoice){

const eventDate =
new Date(invoice.eventDate)
.toLocaleDateString("en-IN",{
day:"2-digit",
month:"short",
year:"numeric"
}).toUpperCase();


document.getElementById("invoiceNum").textContent =
invoice.invoiceNumber;

document.getElementById("eventDateSpan").textContent =
eventDate;

document.getElementById("statusBadge").textContent =
invoice.status;

document.getElementById("footerDate").textContent =
eventDate;


document.getElementById("invoiceContent").innerHTML = `

<div class="billing-grid">

<div class="billing-section">

<h3>Bill To</h3>

<div class="bill-to-name">
${invoice.customerName}
</div>

<div class="event-badge">
${invoice.eventType}
</div>

</div>


<div class="billing-section">

<div class="invoice-details">

<div class="detail-row">
<span class="detail-label">Invoice Number</span>
<span class="detail-value">${invoice.invoiceNumber}</span>
</div>

<div class="detail-row">
<span class="detail-label">Invoice Date</span>
<span class="detail-value">${eventDate}</span>
</div>

<div class="detail-row">
<span class="detail-label">Package</span>
<span class="detail-value">${invoice.packageName}</span>
</div>

</div>

</div>

</div>


<div class="payment-summary">

<h3>Payment Summary</h3>

<table class="payment-table">

<thead>
<tr>
<th>Description</th>
<th>Status</th>
<th>Amount</th>
</tr>
</thead>

<tbody>

<tr>
<td>${invoice.packageName}</td>
<td>Total</td>
<td>₹${invoice.totalAmount}</td>
</tr>

<tr>
<td>Advance Payment</td>
<td>Paid</td>
<td>- ₹${invoice.advancePaid}</td>
</tr>

<tr>
<td>Balance Due</td>
<td>${invoice.status}</td>
<td>₹${invoice.balanceDue}</td>
</tr>

</tbody>

</table>

</div>

`;

}



function sendWhatsApp(){

if(!invoice){

alert("Invoice not loaded yet");
return;

}

if(!invoice.customerPhone){

alert("Customer phone missing");
return;

}

const message = `DP Studio & Light

Invoice Number: ${invoice.invoiceNumber}

Customer: ${invoice.customerName}

Event: ${invoice.eventType}

Package: ${invoice.packageName}

Total Amount: ₹${invoice.totalAmount}

Advance Paid: ₹${invoice.advancePaid}

Balance Due: ₹${invoice.balanceDue}

View Invoice:
${window.location.href}

Thank you for choosing DP Studio & Light 📸`;

const encodedMessage = encodeURIComponent(message);

window.open(

`https://wa.me/${invoice.customerPhone}?text=${encodedMessage}`,

"_blank"

);

}



function downloadPDF(){

if(!invoice){

alert("Invoice not loaded yet");
return;

}

const element = document.querySelector(".container");

const opt = {

margin: 5,

filename: `${invoice.invoiceNumber}.pdf`,

image: { type: "jpeg", quality: 1 },

html2canvas: {

scale: 3,
useCORS: true,
scrollY: 0

},

jsPDF: {

unit: "mm",
format: "a4",
orientation: "portrait"

}

};

html2pdf().set(opt).from(element).save();

}

</script>
