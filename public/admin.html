
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - DP Studio & Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #4a90e2;
            --primary-dark: #357abd;
            --secondary-color: #764ba2;
            --background: #f5f7fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --border-color: #ecf0f1;
        }

        body.dark-mode {
            --background: #0f172a;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-light: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Login Card */
        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out 0.1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.3);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Form */
        .login-form {
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.4s; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dark);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: var(--text-dark);
            background: var(--card-bg);
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: var(--text-light);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        /* Remember Me & Forgot Password */
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
            animation: fadeIn 0.6s ease-out 0.5s both;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.3);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out 0.6s both;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.4s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(74, 144, 226, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Message */
        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            text-align: center;
            animation: slideDown 0.4s ease-out;
            border-left: 4px solid transparent;
        }

        .message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border-left-color: #dc2626;
        }

        .message.loading {
            background: #eff6ff;
            color: #0369a1;
            border-left-color: #0369a1;
        }

        .message.success {
            background: #f0fdf4;
            color: #16a34a;
            border-left-color: #16a34a;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: 'Poppins', sans-serif;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-light);
            animation: fadeIn 0.6s ease-out 0.7s both;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .login-card {
                padding: 35px 25px;
            }

            .logo-text {
                font-size: 20px;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .form-footer {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .theme-toggle {
                top: 15px;
                right: 15px;
                padding: 8px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>

    <!-- Login Container -->
    <div class="container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-icon">DP</div>
                <div class="logo-text">DP Studio & Light</div>
                <p class="subtitle">Admin Panel Login</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        placeholder="Enter your username"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Login to Dashboard
                </button>
            </form>

            <!-- Message -->
            <div id="message" class="message"></div>

            <!-- Footer -->
            <div class="login-footer">
                <p>© 2026 DP Studio & Light Management System</p>
              <p>Owned by <a href="https://instagram.com/imt.dey" target="_blank">@imt.dey</a></p>
            </div>
        </div>
    </div>

    <script>
        // Load theme on page load
        document.addEventListener('DOMContentLoaded', loadTheme);

        // Toggle theme
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle("dark-mode");
            
            const themeBtn = document.getElementById("themeToggle");
            if (body.classList.contains("dark-mode")) {
                localStorage.setItem("loginTheme", "dark");
                themeBtn.textContent = "☀️ Light";
            } else {
                localStorage.setItem("loginTheme", "light");
                themeBtn.textContent = "🌙 Dark";
            }
        }

        // Load theme
        function loadTheme() {
            const savedTheme = localStorage.getItem("loginTheme");
            if (savedTheme === "dark") {
                document.body.classList.add("dark-mode");
                const themeBtn = document.getElementById("themeToggle");
                if (themeBtn) {
                    themeBtn.textContent = "☀️ Light";
                }
            }
        }

        // Handle login
        async function handleLogin(event) {
            event.preventDefault();

            const btn = document.getElementById("loginBtn");
            const result = document.getElementById("message");
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const rememberMe = document.getElementById("rememberMe").checked;

            // Validation
            if (!username || !password) {
                showMessage("Please enter both username and password", "error");
                return;
            }

            // Show loading state
            btn.innerHTML = '<span class="spinner"></span> Logging in...';
            btn.disabled = true;

            try {
                const response = await fetch("/admin/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username,
                        password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save credentials if remember me is checked
                    if (rememberMe) {
                        localStorage.setItem("savedUsername", username);
                    } else {
                        localStorage.removeItem("savedUsername");
                    }

                    // Store token and role
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("username", data.username);
                    localStorage.setItem("role", data.role || "admin");

                    showMessage("✓ Login successful! Redirecting...", "success");

                    // Role-based redirect
                    setTimeout(() => {
                        if (data.role === "super_admin") {
                            window.location.href = "/super-admin.html";
                        } else {
                            window.location.href = "/dashboard.html";
                        }
                    }, 1000);
                } else {
                    showMessage(data.message || "Invalid username or password", "error");
                }
            } catch (error) {
                console.error("Login error:", error);
                showMessage("Connection error. Please try again.", "error");
            } finally {
                btn.innerHTML = "Login to Dashboard";
                btn.disabled = false;
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageBox = document.getElementById("message");
            messageBox.textContent = text;
            messageBox.className = `message show ${type}`;

            // Auto-hide after 5 seconds if not loading
            if (type !== "loading") {
                setTimeout(() => {
                    messageBox.classList.remove("show");
                }, 5000);
            }
        }

        // Handle forgot password
        function handleForgotPassword(event) {
            event.preventDefault();
            showMessage("📧 Password reset instructions sent to your email", "loading");
        }

        // Load saved username if remember me was checked
        document.addEventListener('DOMContentLoaded', () => {
            const savedUsername = localStorage.getItem("savedUsername");
            if (savedUsername) {
                document.getElementById("username").value = savedUsername;
                document.getElementById("rememberMe").checked = true;
            }
        });

        // Allow Enter key to submit form
        document.getElementById("password").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                document.querySelector(".login-form").dispatchEvent(new Event("submit"));
            }
        });
    </script>
</body>
</html>
