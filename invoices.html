<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoices - DP Studio & Light</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f5f7fa;
margin:0;
}

header{
background:#4a90e2;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
}

.table-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#4a90e2;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:12px;
margin-right:5px;
}

.btn-view{
background:#4a90e2;
color:white;
}

.btn-edit{
background:#f39c12;
color:white;
}

.btn-download{
background:#27ae60;
color:white;
}

.empty{
text-align:center;
padding:25px;
}

</style>
</head>

<body>

<header>
<h2>Invoice Management</h2>
<a href="/dashboard.html" style="color:white;text-decoration:none;">
← Dashboard
</a>
</header>


<div class="container">

<div class="table-card">

<h3>All Invoices</h3>

<table>

<thead>

<tr>

<th>Invoice #</th>
<th>Customer</th>
<th>Event</th>
<th>Total</th>
<th>Paid</th>
<th>Pending</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>


<tbody id="tableBody">

<tr>
<td colspan="8" class="empty">
Loading invoices...
</td>
</tr>

</tbody>

</table>

</div>

</div>


<script>

/* CHECK LOGIN */

if(!localStorage.getItem("token")){
window.location="/admin.html";
}


/* LOAD INVOICES */

async function loadInvoices(){

try{

const response = await fetch("/bookings-list",{

headers:{
Authorization:
"Bearer " + localStorage.getItem("token")
}

});


if(!response.ok){
throw new Error("Access denied");
}


const invoices = await response.json();


renderInvoices(invoices);


}catch(error){

console.error(error);

document.getElementById("tableBody").innerHTML = `

<tr>

<td colspan="8" class="empty">

Failed to load invoices

</td>

</tr>

`;

}

}


/* RENDER TABLE */

function renderInvoices(invoices){

if(!invoices.length){

document.getElementById("tableBody").innerHTML = `

<tr>

<td colspan="8" class="empty">

No invoices found

</td>

</tr>

`;

return;

}


document.getElementById("tableBody").innerHTML =

invoices.map(invoice => `

<tr>

<td>${invoice.invoiceNumber}</td>

<td>${invoice.customerName}</td>

<td>${invoice.eventType}</td>

<td>₹ ${invoice.totalAmount}</td>

<td>₹ ${invoice.advancePaid}</td>

<td>₹ ${invoice.balanceDue}</td>

<td>${invoice.status}</td>

<td>

<button class="btn-view"
onclick="viewInvoice('${invoice._id}')">

View

</button>


<button class="btn-edit"
onclick="editPayment('${invoice._id}')">

Edit Payment

</button>


<button class="btn-download"
onclick="downloadInvoice('${invoice._id}')">

Download

</button>

</td>

</tr>

`).join("");

}


/* VIEW INVOICE */

function viewInvoice(id){

window.location = "/invoice-view.html?id=" + id;

}


/* DOWNLOAD INVOICE */

function downloadInvoice(id){

window.location = "/invoice-download.html?id=" + id;

}


/* EDIT PAYMENT */

async function editPayment(id){

const amount = prompt("Enter advance amount");

if(isNaN(amount) || amount < 0){

alert("Invalid amount");

return;

}


const response = await fetch("/update-booking/" + id,{

method:"PUT",

headers:{

"Content-Type":"application/json",

Authorization:
"Bearer " + localStorage.getItem("token")

},

body:JSON.stringify({

advancePaid:Number(amount)

})

});


if(response.status === 403){

alert("Only Super Admin allowed");

return;

}


if(!response.ok){

alert("Payment update failed");

return;

}


alert("Payment updated successfully");

loadInvoices();

}


/* INITIAL LOAD */

loadInvoices();

</script>

</body>

</html>
