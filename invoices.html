<script>

if(!localStorage.getItem("token")){
window.location="/admin.html";
}

let allInvoices=[];

loadInvoices();

async function loadInvoices(){

const response = await fetch("/bookings-list",{

headers:{
Authorization:
"Bearer "+localStorage.getItem("token")
}

});

allInvoices = await response.json();

renderInvoices();

}


function renderInvoices(){

const tableBody =
document.getElementById("tableBody");

if(!allInvoices.length){

tableBody.innerHTML =
"<tr><td colspan='8'>No invoices</td></tr>";

return;

}

tableBody.innerHTML =
allInvoices.map(invoice=>{

return `

<tr>

<td>${invoice.invoiceNumber}</td>

<td>${invoice.customerName}</td>

<td>${invoice.eventType}</td>

<td>₹ ${invoice.totalAmount}</td>

<td>₹ ${invoice.advancePaid}</td>

<td>₹ ${invoice.balanceDue}</td>

<td>${invoice.status}</td>

<td>

<button onclick="viewInvoice('${invoice._id}')">

View

</button>

<button onclick="editPayment('${invoice._id}')">

Edit Payment

</button>

<button onclick="downloadInvoice('${invoice._id}')">

Download

</button>

</td>

</tr>

`;

}).join("");

}


function viewInvoice(id){

window.location=
"/invoice-view.html?id="+id;

}


function downloadInvoice(id){

window.location=
"/invoice-download.html?id="+id;

}


async function editPayment(id){

const amount =
prompt("Enter advance amount");

if(isNaN(amount) || amount<0){
alert("Invalid amount");
return;
}

const response =
await fetch(

"/update-booking/"+id,

{

method:"PUT",

headers:{

"Content-Type":"application/json",

Authorization:
"Bearer "+localStorage.getItem("token")

},

body:JSON.stringify({

advancePaid:Number(amount)

})

}

);

if(response.status===403){

alert("Only Super Admin allowed");

return;

}

alert("Payment updated");

loadInvoices();

}

</script>
