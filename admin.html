<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DP Studio Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Sora',sans-serif;

background:linear-gradient(135deg,#667eea,#764ba2);

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}

.container{

width:100%;

max-width:420px;

padding:20px;

}

.login-card{

background:white;

border-radius:20px;

padding:50px 40px;

box-shadow:0 20px 60px rgba(0,0,0,.3);

}

.logo{

text-align:center;

font-size:26px;

font-weight:700;

margin-bottom:25px;

color:#2d3748;

}

.subtitle{

text-align:center;

font-size:14px;

margin-bottom:30px;

color:#718096;

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

border-radius:10px;

border:2px solid #e2e8f0;

font-size:14px;

transition:.3s;

}

input:focus{

outline:none;

border-color:#667eea;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:linear-gradient(135deg,#667eea,#764ba2);

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

}

button:disabled{

opacity:.6;

cursor:not-allowed;

}

.result{

margin-top:18px;

padding:12px;

border-radius:10px;

font-size:13px;

display:none;

text-align:center;

}

.error{

background:#ffe5e5;

color:#d8000c;

}

.loading{

background:#e6f2ff;

color:#00529b;

}

.success{

background:#d4edda;

color:#155724;

}

.spinner{

display:inline-block;

width:12px;

height:12px;

border:2px solid rgba(255,255,255,.3);

border-top:2px solid white;

border-radius:50%;

animation:spin .6s linear infinite;

margin-right:6px;

}

@keyframes spin{

to{transform:rotate(360deg);}

}

</style>
</head>

<body>

<div class="container">

<div class="login-card">

<div class="logo">

DP Studio Admin Panel

</div>

<p class="subtitle">

Secure Login Access

</p>

<form onsubmit="handleLogin(event)">

<input
type="text"
id="username"
placeholder="Enter username"
required
>

<input
type="password"
id="password"
placeholder="Enter password"
required
>

<button id="loginBtn">

Login to Dashboard

</button>

</form>

<div id="result" class="result"></div>

</div>

</div>


<script>

async function handleLogin(event){

event.preventDefault();

const btn=document.getElementById("loginBtn");

const result=document.getElementById("result");

btn.innerHTML='<span class="spinner"></span> Logging in...';

btn.disabled=true;

const username=

document.getElementById("username").value;

const password=

document.getElementById("password").value;

try{

const res=await fetch("/admin/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

username,

password

})

});

const data=await res.json();

if(res.ok){

localStorage.setItem("token",data.token);

localStorage.setItem("role",data.role);

/* ROLE BASED REDIRECT */

if(data.role==="super_admin"){

window.location.href="/superadmin.html";

}else{

window.location.href="/dashboard.html";

}

}else{

result.style.display="block";

result.className="result error";

result.innerText=data;

}

}catch(err){

result.style.display="block";

result.className="result error";

result.innerText="Server connection failed";

}

btn.innerHTML="Login to Dashboard";

btn.disabled=false;

}

</script>

</body>
</html>
