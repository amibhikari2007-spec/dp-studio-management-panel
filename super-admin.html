<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Panel - DP Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
background:#0a0c10;
color:#e8edf5;
font-family:'DM Mono',monospace;
margin:0;
}
header{
padding:18px 30px;
display:flex;
justify-content:space-between;
background:#10141c;
border-bottom:1px solid rgba(255,255,255,.08);
}
button{
cursor:pointer;
}
.container{
padding:30px;
}
.table-card{
background:#10141c;
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
margin-bottom:30px;
}
.table-header{
padding:16px 24px;
display:flex;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,.08);
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:12px 18px;
font-size:13px;
}
thead{
background:#161c28;
}
tbody tr{
border-bottom:1px solid rgba(255,255,255,.05);
}
.state-row td{
text-align:center;
padding:50px;
color:#5a6478;
}
.delete-btn{
background:#f76f6f;
color:white;
border:none;
padding:6px 14px;
border-radius:6px;
}
</style>
</head>
<body>

<header>
<div>
<b>Super Admin Panel</b>
</div>

<div>
<button onclick="goDashboard()">Dashboard</button>
<button onclick="logout()">Logout</button>
</div>
</header>


<div class="container">

<!-- BOOKINGS -->
<div class="table-card">

<div class="table-header">
<div>Bookings Management</div>
<div id="bookingCount">Loading…</div>
</div>

<table>

<thead>
<tr>
<th>Client</th>
<th>Event</th>
<th>Date</th>
<th>Total Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookingTable">

<tr class="state-row">
<td colspan="5">Loading bookings…</td>
</tr>

</tbody>

</table>

</div>


<!-- ACTIVITY LOGS -->
<div class="table-card">

<div class="table-header">
<div>Activity Logs</div>
<div id="tableCount">Loading…</div>
</div>

<table>

<thead>
<tr>
<th>User</th>
<th>Action</th>
<th>Details</th>
<th>Time</th>
</tr>
</thead>

<tbody id="activityTable">

<tr class="state-row">
<td colspan="4">Loading logs…</td>
</tr>

</tbody>

</table>

</div>

</div>


<script>

/* AUTH CHECK */

const token=localStorage.getItem("token");

if(!token){
window.location="/admin.html";
}


/* DASHBOARD NAV */

function goDashboard(){
window.location="/dashboard.html";
}

function logout(){
localStorage.removeItem("token");
window.location="/admin.html";
}


/* LOAD BOOKINGS */

async function loadBookings(){

try{

const res=await fetch("/superadmin/bookings",{

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
}

});

if(!res.ok) throw new Error();

const data=await res.json();

renderBookings(data);

}catch(err){

document.getElementById("bookingTable").innerHTML=
`<tr class="state-row"><td colspan="5">Failed to load bookings</td></tr>`;

}

}


function renderBookings(bookings){

document.getElementById("bookingCount").innerText=
bookings.length+" records";

if(!bookings.length){

document.getElementById("bookingTable").innerHTML=
`<tr class="state-row"><td colspan="5">No bookings found</td></tr>`;

return;

}

document.getElementById("bookingTable").innerHTML=

bookings.map(b=>`

<tr>

<td>${b.customerName||"--"}</td>

<td>${b.eventType||"--"}</td>

<td>${new Date(b.eventDate).toLocaleDateString()}</td>

<td>₹ ${b.totalAmount||0}</td>

<td>

<button class="delete-btn"
onclick="deleteBooking('${b._id}')">

Delete

</button>

</td>

</tr>

`).join("");

}


/* DELETE BOOKING */

async function deleteBooking(id){

if(!confirm("Delete booking permanently?")) return;

const res=await fetch("/superadmin/delete-booking/"+id,{

method:"DELETE",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
}

});

const data=await res.json();

if(data.success){

loadBookings();
loadActivity();

}

}


/* LOAD ACTIVITY */

async function loadActivity(){

try{

const res=await fetch("/activity-list",{

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
}

});

if(!res.ok) throw new Error();

const logs=await res.json();

renderLogs(logs);

}catch(err){

document.getElementById("activityTable").innerHTML=
`<tr class="state-row"><td colspan="4">Failed to load logs</td></tr>`;

}

}


function renderLogs(logs){

document.getElementById("tableCount").innerText=
logs.length+" records";

if(!logs.length){

document.getElementById("activityTable").innerHTML=
`<tr class="state-row"><td colspan="4">No logs found</td></tr>`;

return;

}

document.getElementById("activityTable").innerHTML=

logs.map(l=>`

<tr>

<td>${l.username||"--"}</td>

<td>${l.action||"--"}</td>

<td>${l.details||"--"}</td>

<td>${new Date(l.createdAt).toLocaleString()}</td>

</tr>

`).join("");

}


/* INIT */

loadBookings();
loadActivity();

</script>

</body>
</html>
