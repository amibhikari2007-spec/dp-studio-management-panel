<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Admin Panel - DP Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f5f7fa;
margin:0;
}

header{
background:#0f1f35;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0f1f35;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

.empty{
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h2>Super Admin Dashboard</h2>

<a href="/dashboard.html"
style="color:white;text-decoration:none;">

← Dashboard

</a>

</header>


<div class="container">

<div class="card">

<h3>Recent Activity Logs</h3>

<table>

<thead>

<tr>

<th>User</th>
<th>Action</th>
<th>Details</th>
<th>Time</th>

</tr>

</thead>

<tbody id="activityTable">

<tr>

<td colspan="4" class="empty">

Loading activity...

</td>

</tr>

</tbody>

</table>

</div>

</div>


<script>

/* LOGIN CHECK */

if(!localStorage.getItem("token")){

window.location="/admin.html";

}


/* LOAD ACTIVITY */

async function loadActivity(){

try{

const response = await fetch("/activity-list",{

headers:{
Authorization:
"Bearer " + localStorage.getItem("token")
}

});


if(response.status===403){

alert("Only Super Admin allowed");

window.location="/dashboard.html";

return;

}


if(!response.ok){

throw new Error("Failed to load activity");

}


const activities = await response.json();


renderActivity(activities);


}catch(err){

console.error(err);

document.getElementById("activityTable").innerHTML=`

<tr>

<td colspan="4" class="empty">

Failed to load booking activity

</td>

</tr>

`;

}

}


/* RENDER TABLE */

function renderActivity(activities){

if(!activities.length){

document.getElementById("activityTable").innerHTML=`

<tr>

<td colspan="4" class="empty">

No activity found

</td>

</tr>

`;

return;

}


document.getElementById("activityTable").innerHTML=

activities.map(a=>`

<tr>

<td>${a.username}</td>

<td>${a.action}</td>

<td>${a.details}</td>

<td>${formatDate(a.createdAt)}</td>

</tr>

`).join("");

}


/* FORMAT DATE */

function formatDate(date){

return new Date(date).toLocaleString("en-IN",{

day:"2-digit",
month:"short",
year:"numeric",
hour:"2-digit",
minute:"2-digit"

});

}


/* INITIAL LOAD */

loadActivity();

</script>

</body>

</html>
